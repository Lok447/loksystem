name: Build and Release

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: write

on:
  push:
    branches: [dev]
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Optional release tag name. Defaults to v<package.json version> for manual releases.
        required: false
        type: string

env:
  BUN_INSTALL_REGISTRY: "https://registry.npmjs.org/"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-pipeline:
    name: Build Pipeline
    uses: ./.github/workflows/_build-reusable.yml
    # Support automatic builds from dev/tag and manual builds from the Actions page.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/dev' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-dev-'))
    with:
      skip_format_check: ${{ github.event_name == 'workflow_dispatch' }}
      matrix: >-
        {"include":[
          {"platform":"macos-arm64","os":"macos-14","command":"node scripts/build-with-builder.js arm64 --mac --arm64","artifact-name":"macos-build-arm64","arch":"arm64"},
          {"platform":"macos-x64","os":"macos-14","command":"node scripts/build-with-builder.js x64 --mac --x64","artifact-name":"macos-build-x64","arch":"x64"},
          {"platform":"windows-x64","os":"windows-2022","command":"node scripts/build-with-builder.js x64 --win --x64","artifact-name":"windows-build-x64","arch":"x64"},
          {"platform":"windows-arm64","os":"windows-2022","command":"node scripts/build-with-builder.js arm64 --win --arm64","artifact-name":"windows-build-arm64","arch":"arm64"},
          {"platform":"linux-x64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js x64 --linux --x64","artifact-name":"linux-build-x64","arch":"x64"},
          {"platform":"linux-arm64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js arm64 --linux --arm64","artifact-name":"linux-build-arm64","arch":"arm64"}
        ]}
    secrets: inherit

  auto-retry-workflow:
    name: Auto Retry on Build Failure
    runs-on: ubuntu-latest
    needs: build-pipeline
    if: |
      failure() &&
      github.run_attempt == 1 &&
      (github.event_name == 'push' || github.event_name == 'schedule')

    steps:
      - name: Log retry information
        run: |
          echo "=========================================="
          echo "Auto retry triggered (first failure)"
          echo "=========================================="
          echo "Build failed on first attempt, preparing auto retry..."
          echo "Current attempt: ${{ github.run_attempt }}"
          echo "Wait strategy: 5 minutes cooldown before retry"
          echo "=========================================="

      - name: Wait before retry (5 min cooldown)
        run: |
          echo "Waiting 5 minutes before retry..."
          echo "Start: $(date)"
          sleep 300
          echo "End: $(date)"
          echo "Triggering retry..."

      - name: Trigger workflow rerun
        run: |
          echo "Triggering full workflow rerun (attempt 2)..."

          response=$(curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -w "\n%{http_code}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun)

          http_code=$(echo "$response" | tail -n1)

          if [ "$http_code" = "201" ]; then
            echo ""
            echo "Retry triggered successfully"
            echo "This will be attempt 2"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo ""
            echo "Retry trigger failed, HTTP status: $http_code"
            echo "Response:"
            echo "$response" | head -n-1
            exit 1
          fi

  create-tag:
    name: Create Tag from Branch
    runs-on: ubuntu-latest
    needs: [build-pipeline]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/dev'
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
      is_dev: ${{ steps.create_tag.outputs.is_dev }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create and push tag
        id: create_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}

          if [ "$BRANCH_NAME" = "dev" ]; then
            TAG_NAME="v${VERSION}-dev-${COMMIT_SHORT}"
            IS_DEV="true"
            echo "Development release: $TAG_NAME"
          else
            TAG_NAME="v$VERSION"
            IS_DEV="false"
            echo "Production release: $TAG_NAME"
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_dev=$IS_DEV" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME$"; then
            if [ "$IS_DEV" = "false" ]; then
              echo "Tag $TAG_NAME already exists, auto-incrementing version..."

              if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                MAJOR=${BASH_REMATCH[1]}
                MINOR=${BASH_REMATCH[2]}
                PATCH=${BASH_REMATCH[3]}
                NEW_PATCH=$((PATCH + 1))
                NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

                echo "Updating package.json version to $NEW_VERSION"
                bun pm version $NEW_VERSION

                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"

                git add package.json bun.lock
                git commit -m "chore: bump version to $NEW_VERSION"
                git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
                git push origin $BRANCH_NAME

                COMMIT_SHORT=$(git rev-parse --short HEAD)
                TAG_NAME="v${NEW_VERSION}-${COMMIT_SHORT}"

                echo "New tag with updated version: $TAG_NAME"
                echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
              else
                TAG_NAME="v${VERSION}-${COMMIT_SHORT}"
                echo "Fallback: creating tag with commit ID: $TAG_NAME"
                echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
              fi
            else
              echo "Dev tag $TAG_NAME already exists, this should not happen"
              exit 1
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Creating tag: $TAG_NAME"
          git tag $TAG_NAME
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin $TAG_NAME
          echo "Successfully created and pushed tag: $TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-pipeline, create-tag]
    # Tag push skips create-tag, so manual dispatch and tag push need their own path here.
    if: always() && needs.build-pipeline.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.create-tag.result == 'success' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-dev-')))
    environment: ${{ ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev') || needs.create-tag.outputs.is_dev == 'true') && 'dev-release' || 'release' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version for release
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            IS_DEV="false"
            echo "Creating stable release from tag: $TAG_NAME"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            INPUT_TAG="${{ github.event.inputs.tag_name }}"

            if [ -n "$INPUT_TAG" ]; then
              TAG_NAME="$INPUT_TAG"
            elif [ "$GITHUB_REF" = "refs/heads/dev" ]; then
              VERSION=$(node -p "require('./package.json').version")
              TAG_NAME="v${VERSION}-dev-manual-${GITHUB_SHA::7}"
            else
              VERSION=$(node -p "require('./package.json').version")
              TAG_NAME="v$VERSION"
            fi

            if [[ "$TAG_NAME" == *"-dev-"* ]] || [ "$GITHUB_REF" = "refs/heads/dev" ]; then
              IS_DEV="true"
              echo "Creating manual development release: $TAG_NAME"
            else
              IS_DEV="false"
              echo "Creating manual release: $TAG_NAME"
            fi
          else
            TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
            IS_DEV="${{ needs.create-tag.outputs.is_dev }}"
            echo "Creating development release: $TAG_NAME"
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_dev=$IS_DEV" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build-artifacts

      - name: Prepare release assets (normalize updater metadata)
        shell: bash
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.is_dev == 'true' && format('Development Build {0}', steps.version.outputs.tag_name) || steps.version.outputs.tag_name }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.zip
            release-assets/**/*.yml
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.version.outputs.is_dev == 'true' || contains(steps.version.outputs.tag_name, 'beta') || contains(steps.version.outputs.tag_name, 'alpha') || contains(steps.version.outputs.tag_name, 'rc') }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
